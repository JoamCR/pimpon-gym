version: "3.8"
services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=pimpon2026
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - DB_TYPE=sqlite
      - N8N_ENCRYPTION_KEY=pimpon_key_segura_2026
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: